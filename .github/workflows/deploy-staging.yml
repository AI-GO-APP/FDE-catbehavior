# ============================================================
# 部署到 Staging
#
# Push 到 main 即自動部署至 https://FDE-catbehavior.staging.ai-go.app
# 也可在 GitHub Actions 頁面手動觸發
# ============================================================

name: 部署到 Staging

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  deploy:
    uses: AI-GO-APP/.github/.github/workflows/staging-deploy.yml@main
    with:
      project-name: ${{ github.event.repository.name }}
      port: '3004'
    secrets: inherit
